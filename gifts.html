}

.gift-card:hover{

0 0 20px rgba(255,255,255,.48),
0 0 48px rgba(255,255,255,.26),
0 12px 28px rgba(0,0,0,.18);
}

.gift-card::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
height:5px;

background:
linear-gradient(
90deg,
#ff8fb1,
#ffbfd0,
#ff8fb1
);
}

.gift-photo{
width:100%;
height:170px;
object-fit:cover;
border-radius:20px;
