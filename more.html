<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:
linear-gradient(rgba(10,0,4,.72),rgba(10,0,4,.72)),
url('img/bg.png');


color:white;
min-height:100vh;
padding:24px 18px 120px;
max-width:560px;
margin:auto;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,rgba(255,0,90,.35),transparent 40%),
radial-gradient(circle at bottom right,rgba(255,80,0,.25),transparent 40%);
pointer-events:none;
z-index:-1;
}


.title{
font-size:38px;
font-weight:900;
margin:20px 0 28px;

background:linear-gradient(
90deg,
#ff5fa2,
#7ee7ff,
#c07cff,
#ffe27a
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 18px rgba(255,255,255,.35),
0 0 40px rgba(255,0,120,.25);

animation:titleFlow 6s linear infinite;
background-size:300% 300%;
}


.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.link-card{
text-decoration:none;
color:white;
display:block;
}


.card{
position:relative;
overflow:hidden;

background:
linear-gradient(
135deg,
rgba(255,0,120,.18),
rgba(0,180,255,.12),
rgba(170,0,255,.16),
rgba(255,180,0,.12)
);

border:2px solid rgba(255,255,255,.35);

border-radius:32px;

padding:24px;

backdrop-filter:blur(22px);

box-shadow:
0 0 20px rgba(255,0,120,.35),
0 0 40px rgba(0,180,255,.25),
0 0 70px rgba(170,0,255,.18);

transition:
transform .3s ease,
box-shadow .3s ease,
filter .3s ease;
}

.card::before{
content:'';
position:absolute;
inset:-60%;

background:
conic-gradient(
from 0deg,
rgba(255,0,120,.0),
rgba(255,0,120,.28),
rgba(0,200,255,.28),
rgba(170,0,255,.28),
rgba(255,255,255,.18),
rgba(255,180,0,.28),
rgba(255,0,120,.0)
);

animation:holoSpin 10s linear infinite;
filter:blur(18px);
opacity:.9;
}

.card::after{
content:'';
position:absolute;
inset:1px;

border-radius:30px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.08),
rgba(255,255,255,.02)
);

pointer-events:none;
}

.card > *{
position:relative;
z-index:2;
}

.link-card:hover .card{
transform:translateY(-8px) scale(1.03);

box-shadow:
0 0 40px rgba(255,0,120,.7),
0 0 80px rgba(0,180,255,.55),
0 0 120px rgba(170,0,255,.4),
0 0 160px rgba(255,180,0,.25);

filter:brightness(1.1);
}


.link-card:active .card{
transform:scale(.95);

filter:brightness(1.15);

box-shadow:
0 0 30px rgba(70, 129, 255, 0.95),
0 0 60px rgba(255,0,0,.55);
}


.icon{
width:74px;
height:74px;
display:flex;
align-items:center;
justify-content:center;

font-size:34px;
margin-bottom:18px;

border-radius:50%;

background:
linear-gradient(
135deg,
rgba(255,0,120,.45),
rgba(0,180,255,.38),
rgba(170,0,255,.45)
);

border:1px solid rgba(255,255,255,.25);

box-shadow:
0 0 25px rgba(255,0,120,.5),
0 0 45px rgba(0,180,255,.45),
0 0 70px rgba(170,0,255,.35);

text-shadow:
0 0 18px rgba(255,255,255,1);

animation:iconPulse 4s ease-in-out infinite;
}


.card h3{
font-size:22px;
margin-bottom:12px;
font-weight:900;

text-shadow:
0 0 10px rgba(255,255,255,.9),
0 0 24px rgba(255,80,120,.75);
}

.card p{
opacity:.92;
line-height:1.8;
font-size:14px;

padding:10px 12px;

border-radius:16px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

box-shadow:
inset 0 0 15px rgba(255,255,255,.03);
}

.bottom-nav{
position:fixed;
left:50%;
bottom:18px;
transform:translateX(-50%);
width:min(92%,520px);

background:rgba(20,10,18,.76);

border:1px solid rgba(255,120,160,.18);

border-radius:30px;

display:flex;
justify-content:space-around;
align-items:center;

padding:14px;

backdrop-filter:blur(20px);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
text-decoration:none;
color:#ffdce7;
font-size:12px;
}

.nav-icon{
font-size:24px;
}

@keyframes spinLight{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

@keyframes pulseGlow{
0%,100%{
transform:scale(1);
box-shadow:
0 0 20px rgba(255,60,90,.55),
inset 0 0 20px rgba(255,255,255,.12);
}

50%{
transform:scale(1.08);
box-shadow:
0 0 35px rgba(255,100,130,.95),
0 0 60px rgba(255,0,80,.45),
inset 0 0 20px rgba(255,255,255,.16);
}
}


@keyframes holoSpin{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

@keyframes iconPulse{
0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.1);
}
}

@keyframes titleFlow{
0%{
background-position:0% 50%;
}
50%{
background-position:100% 50%;
}
100%{
background-position:0% 50%;
}
}

</style>

</head>
