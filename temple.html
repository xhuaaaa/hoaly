<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="icon.png">
<title>LyHoa Life ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#050200;
font-family:
"Times New Roman",
"Microsoft JhengHei",
serif;
}

#intro{
position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:
radial-gradient(circle at center,
rgba(255,180,60,.12),
rgba(10,5,0,.98));

overflow:hidden;
}

/* 星空 */

.stars{
position:absolute;
inset:0;

background:
radial-gradient(circle at 20% 30%,rgba(255,220,120,.95) 0 1px,transparent 2px),
radial-gradient(circle at 70% 20%,rgba(255,180,60,.8) 0 1px,transparent 2px),
radial-gradient(circle at 80% 70%,rgba(255,220,180,.8) 0 1px,transparent 2px),
radial-gradient(circle at 35% 80%,rgba(255,210,120,.7) 0 1px,transparent 2px);

background-size:280px 280px;

animation:starMove 18s linear infinite;

opacity:.75;
}

/* 超厚重神殿門主體 */

.temple-door{
position:relative;

width:520px !important;
height:620px !important;
perspective:2400px !important;

display:flex;
justify-content:center;
align-items:center;
transform-style: preserve-3d;
}

.door-left,
.door-right{

position:absolute;
top:0;

width:50% !important;
height:100%;

background:
linear-gradient(
145deg,
#120700 0%,
#3b1a00 10%,
#7a4300 18%,
#ffcf6b 28%,
#fff0bc 40%,
#a65d00 58%,
#2b1200 100%
) !important;

border:8px solid rgba(255,220,120,1) !important;

box-shadow:
0 0 45px rgba(255,190,60,.75),
inset 0 0 160px rgba(255,255,255,.18),
inset 0 0 70px rgba(255,220,120,.35),
0 0 140px rgba(255,180,40,.28) !important;

backdrop-filter:blur(4px);

overflow:hidden;
}

.door-left{
left:0;

transform-origin:left center;

animation:openLeft 4s cubic-bezier(.18,1,.22,1) forwards;
}

.door-right{
right:0;

transform-origin:right center;

animation:openRight 4s cubic-bezier(.18,1,.22,1) forwards;
}

.door-pattern{

position:absolute;
inset:24px;

border:1px solid rgba(255,220,120,.45);

box-shadow:
0 0 20px rgba(255,200,80,.12);

}

.circle{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:140px;
height:140px;

border-radius:50%;

border:1px solid rgba(255,220,120,.65);

box-shadow:
0 0 20px rgba(255,200,80,.18);
}

/* 中央基礎發光 */

.center-light{

position:absolute;

width:120px;
height:120px;

border-radius:50%;

background:
radial-gradient(circle,
rgba(255,255,255,1),
rgba(255,220,120,.95),
rgba(255,180,40,.12));

filter:blur(4px);

box-shadow:
0 0 60px rgba(255,220,120,.95),
0 0 120px rgba(255,180,40,.65);

animation:portalLight 7s ease forwards;
}

/* 外圈 */

.magic-ring{
position:absolute;

width:620px;
height:620px;

border-radius:50%;

border:1px solid rgba(255,220,120,.18);

box-shadow:
0 0 30px rgba(255,220,120,.22),
inset 0 0 30px rgba(255,220,120,.12);

animation:rotateRing 20s linear infinite;
}

/* logo */

.logo{

position:absolute;

top:120px;

font-size:120px;
font-weight:900;

background:
linear-gradient(
135deg,
#fff7d8,
#ffd36f,
#fff1c7
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 12px rgba(255,240,180,.95),
0 0 42px rgba(255,180,40,.45);

opacity:0;

animation:logoShow 3s ease forwards 1s;
}

/* title */

.title{

position:absolute;

bottom:170px;

font-size:42px;
font-weight:900;
letter-spacing:3px;

color:#fff0c8;

text-shadow:
0 0 12px rgba(255,220,120,.95),
0 0 30px rgba(255,180,40,.35);

opacity:0;

animation:textFade 2s ease forwards 2.4s;
}

.sub{

position:absolute;

bottom:130px;

font-size:18px;
letter-spacing:5px;

color:#ffe7b0;

opacity:0;

animation:textFade 2s ease forwards 2.8s;
}

/* loading */

.loading-wrap{

position:absolute;

bottom:72px;

width:320px;
height:5px;

border-radius:999px;

background:rgba(255,220,120,.12);

overflow:hidden;

box-shadow:
0 0 20px rgba(255,220,120,.22);
}

.loading-bar{

height:100%;
width:0%;

border-radius:999px;

background:
linear-gradient(
90deg,
#fff6d0,
#ffd36f,
#fffef2
);

box-shadow:
0 0 18px rgba(255,220,120,.95);

animation:loading 5s ease forwards;
}

/* 金塵 */

.gold-particle{

position:absolute;

width:4px;
height:4px;

border-radius:50%;

background:#ffd36f;

box-shadow:
0 0 10px rgba(255,220,120,.95);

animation:floatParticle linear infinite;
}

@keyframes openLeft{

0%{
transform:perspective(1200px) rotateY(0deg);
}

100%{
transform:perspective(1200px) rotateY(-82deg);
}
}

@keyframes openRight{

0%{
transform:perspective(1200px) rotateY(0deg);
}

100%{
transform:perspective(1200px) rotateY(82deg);
}
}

@keyframes rotateRing{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}
}

@keyframes logoShow{

from{
opacity:0;
transform:scale(.4);
filter:blur(12px);
}

to{
opacity:1;
transform:scale(1);
filter:blur(0px);
}
}

@keyframes textFade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0px);
}
}

@keyframes loading{

0%{
width:0%;
}

100%{
width:100%;
}
}

@keyframes starMove{
from{
transform:translateY(0px);
}
to{
transform:translateY(-280px);
}
}

@keyframes floatParticle{

0%{
transform:
translateY(0px)
scale(0);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:
translateY(-120vh)
translateX(60px)
scale(1.5);

opacity:0;
}
}


/* 🛠️ 核心還原：星座線條容器置頂（z-index: 30）並同步 3D 推進前進動畫 */
.zodiac-line-wrap{
position:absolute;
z-index:30 !important; 

width:520px;
height:240px;
transform:translateY(-145px);

display:flex;
justify-content:center;
align-items:center;

opacity:0;
pointer-events: none;
transform-origin: center center;

animation:
  showLines 2s ease forwards 2.4s,
  templeZoom 7s ease-in-out forwards; /* 補回前進動畫 */
}

.zodiac-svg{
width:100%;
height:100%;
}

/* 🛠️ 核心還原：星座線條本體（加粗到 9） */
.draw-line{
fill:none;
stroke:url(#goldLine);
stroke-width:9 !important; 
stroke-linecap:round;
stroke-linejoin:round;
}

/* 🛠️ 核心還原：星座專屬發光亮框（粗度 16 霓虹外框） */
.glow-border-line {
fill:none;
stroke:#77c5ff !important; 
stroke-width:16 !important; 
stroke-linecap:round;
stroke-linejoin:round;
opacity: 0.9;
filter: url(#superGlow); 
}

.libra-glow-group {
  opacity: 0;
  animation: fadeInLibra 2.0s cubic-bezier(0.4, 0, 0.2, 1) forwards 2.6s;
}

@keyframes fadeInLibra {
  to { opacity: 1; }
}

.scorpio-line{
stroke-dasharray: 1200;
stroke-dashoffset: 1200;
animation: drawScorpio 2.0s cubic-bezier(0.4, 0, 0.2, 1) forwards 3.0s;
}

/* 🛠️ 核心還原：天秤座底座橫線動畫與發光 */
.libra-extra-line{
fill:none;
stroke:#6fb8ff;
stroke-width:9 !important;
stroke-linecap:round;
stroke-dasharray:400;
stroke-dashoffset:400;
opacity:1;
animation: drawExtraLine 1.6s ease forwards 3.2s;
}

.libra-extra-glow {
fill:none;
stroke:#2299ff !important;
stroke-width:16 !important;
stroke-linecap:round;
stroke-dasharray:400;
stroke-dashoffset:400;
filter: url(#superGlow);
opacity:0.8;
animation: drawExtraLine 1.6s ease forwards 3.2s;
}

@keyframes drawExtraLine{
to{
stroke-dashoffset:0;
}
}


@keyframes drawScorpio {
  to { stroke-dashoffset: 0; }
}

@keyframes showLines{
from{
opacity:0;
transform:scale(.7) translateY(-145px);
filter:blur(10px);
}
to{
opacity:1;
transform:scale(1) translateY(-145px);
filter:blur(0px);
}
}


/* ===== 往神殿內前進 ===== */

.temple-door{
animation:
templeZoom 7s ease-in-out forwards;
transform-origin:center center;
}

@keyframes templeZoom{

0%{
transform:
scale(1)
translateY(0px);
filter:blur(0px);
}

70%{
transform:
scale(1.18)
translateY(-10px);
filter:blur(0px);
}

100%{
transform:
scale(2.35)
translateY(20px);
filter:blur(8px);
}
}

#intro::after{

content:'';

position:absolute;
inset:0;

background:
radial-gradient(circle at center,
transparent 0%,
rgba(255,220,120,.05) 40%,
rgba(0,0,0,.92) 100%);

pointer-events:none;
}

@keyframes portalLight{

0%{
opacity:.7;
transform:scale(1);
}

70%{
opacity:1;
transform:scale(1.5);
}

100%{
opacity:1;
transform:scale(4.5);
filter:blur(18px);
}
}


/* ===== 浮雕裝飾 ===== */

.door-left::before,
.door-right::before{

content:'';

position:absolute;
inset:12px !important;

border-radius:18px;

border:5px solid rgba(255,245,190,.98) !important;

box-shadow:
inset 0 0 45px rgba(255,255,255,.25),
0 0 24px rgba(255,220,120,.45),
0 0 60px rgba(255,180,40,.18) !important;
}

.door-left::after,
.door-right::after{

content:'';

position:absolute;

width:300px !important;
height:300px !important;

left:50%;
top:50%;

transform:translate(-50%,-50%);

border-radius:50%;

border:5px solid rgba(255,220,120,.45);

box-shadow:
0 0 50px rgba(255,220,120,.45),
inset 0 0 50px rgba(255,240,180,.12) !important;

opacity:.95;
}


/* ===== 🛠️ 核心還原：極亮魔幻球體顏色（藍白紅漸層＋高亮發光） ===== */

.energy-core{
position:absolute;
width:200px !important;
height:200px !important;
border-radius:50%;

background:
radial-gradient(circle,
rgba(255,255,255,1) 0%,
rgba(120,180,255,.95) 20%,
rgba(255,60,60,.9) 45%,
rgba(255,0,0,.25) 70%,
transparent 100%) !important;

box-shadow:
0 0 35px rgba(255,255,255,.35),
0 0 90px rgba(255,0,0,.28),
0 0 160px rgba(120,0,0,.75) !important;

animation:corePulse 2.4s ease-in-out infinite;
z-index:8;
}

.energy-ring{
display:none !important;
}

.temple-door::before{
display:none !important;
}

.lightning-container, .vortex-swirl {
  display: none !important;
}

@keyframes corePulse{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.12);
}
}


/* ===== HARD FIX FOR SQUARE CORNERS ===== */

.swirl-layer,
.swirl-layer2{

border-radius:50% !important;

-webkit-mask-image:radial-gradient(circle, #fff 58%, transparent 59%) !important;
mask-image:radial-gradient(circle, #fff 58%, transparent 59%) !important;

overflow:hidden !important;
}

</style>
</head>

<body>

<div id="intro">

<div class="stars"></div>

<div class="magic-ring"></div>
<div class="energy-core"></div>

<div class="logo">H ♥ L</div>

<div class="zodiac-line-wrap">
<svg class="zodiac-svg" viewBox="0 0 600 300">
<defs>
<linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#dff4ff"/>
<stop offset="50%" stop-color="#4fa8ff"/>
<stop offset="100%" stop-color="#d8f0ff"/>
</linearGradient>

<filter id="superGlow" x="-50%" y="-50%" width="200%" height="200%">
  <feGaussianBlur stdDeviation="6" result="blur1" />
  <feGaussianBlur stdDeviation="12" result="blur2" />
  <feMerge>
    <feMergeNode in="blur2" />
    <feMergeNode in="blur1" />
    <feMergeNode in="SourceGraphic" />
  </feMerge>
</filter>
</defs>

<g class="libra-glow-group">
  <g class="glow-border-line">
    <path d="M 65 145 L 125 145 Q 155 85 185 145 L 245 145" />
    <path class="libra-extra-glow" d="M 55 185 L 255 185" />
  </g>
  
  <g class="draw-line">
    <path d="M 65 145 L 125 145 Q 155 85 185 145 L 245 145" />
    <path class="libra-extra-line" d="M 55 185 L 255 185" />
  </g>
</g>

<g style="animation: drawScorpio 2.0s cubic-bezier(0.4, 0, 0.2, 1) forwards 3.0s;">
  <path class="glow-border-line scorpio-line"
  d="M350 210 L350 120 Q350 90 380 90 Q410 90 410 120 L410 210 L410 120 Q410 90 440 90 Q470 90 470 120 L470 180 Q470 220 520 220 L500 198 M520 220 L488 238" />
  
  <path class="draw-line scorpio-line"
  d="M350 210 L350 120 Q350 90 380 90 Q410 90 410 120 L410 210 L410 120 Q410 90 440 90 Q470 90 470 120 L470 180 Q470 220 520 220 L500 198 M520 220 L488 238" />
</g>
</svg>
</div>

<div class="temple-door">

<div class="center-light"></div>

<div class="door-left">
<div class="door-pattern"></div>
<div class="circle"></div>
</div>

<div class="door-right">
<div class="door-pattern"></div>
<div class="circle"></div>
</div>

</div>

<div class="title">LY HOA Store</div>

<div class="sub">LOVE · MEMORY · FOREVER</div>

<div class="loading-wrap">
<div class="loading-bar"></div>
</div>

</div>

<script>
const starsContainer = document.querySelector(".stars") || document.body;

for(let i=0;i<60;i++){
const p = document.createElement("div");
p.className = "gold-particle";
p.style.left = Math.random()*100 + "vw";
p.style.top = Math.random()*100 + "vh";
p.style.animationDuration = (6 + Math.random()*8) + "s";
p.style.animationDelay = (Math.random()*6) + "s";
starsContainer.appendChild(p);
}

setTimeout(()=>{
document.getElementById("intro").style.transition="2s";
document.getElementById("intro").style.opacity="0";

setTimeout(()=>{
document.getElementById("intro").style.display="none";
},2000);
},6200);
</script>

<script>
setTimeout(()=>{
window.location.href="home.html";
},8200);
</script>

</body>
</html>
