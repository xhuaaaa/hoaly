<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="icon.png">
<title>LyHoa Life ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#050200;
font-family:
"Times New Roman",
"Microsoft JhengHei",
serif;
}

#intro{
position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:
radial-gradient(circle at center,
rgba(255,180,60,.12),
rgba(10,5,0,.98));

overflow:hidden;
}

/* 星空 */

.stars{
position:absolute;
inset:0;

background:
radial-gradient(circle at 20% 30%,rgba(255,220,120,.95) 0 1px,transparent 2px),
radial-gradient(circle at 70% 20%,rgba(255,180,60,.8) 0 1px,transparent 2px),
radial-gradient(circle at 80% 70%,rgba(255,220,180,.8) 0 1px,transparent 2px),
radial-gradient(circle at 35% 80%,rgba(255,210,120,.7) 0 1px,transparent 2px);

background-size:280px 280px;

animation:starMove 18s linear infinite;

opacity:.75;
}

/* 神殿門 */

.temple-door{
position:relative;

width:340px;
height:520px;

display:flex;
justify-content:center;
align-items:center;
}

.door-left,
.door-right{

position:absolute;
top:0;

width:48%;
height:100%;

background:
linear-gradient(
180deg,
rgba(255,230,150,.22),
rgba(120,70,0,.45)
);

border:2px solid rgba(255,220,120,.85);

box-shadow:
0 0 22px rgba(255,200,80,.35),
inset 0 0 40px rgba(255,220,120,.12);

backdrop-filter:blur(4px);

overflow:hidden;
}

.door-left{
left:0;

transform-origin:left center;

animation:openLeft 4s cubic-bezier(.18,1,.22,1) forwards;
}

.door-right{
right:0;

transform-origin:right center;

animation:openRight 4s cubic-bezier(.18,1,.22,1) forwards;
}

.door-pattern{

position:absolute;
inset:24px;

border:1px solid rgba(255,220,120,.45);

box-shadow:
0 0 20px rgba(255,200,80,.12);

}

.circle{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:140px;
height:140px;

border-radius:50%;

border:1px solid rgba(255,220,120,.65);

box-shadow:
0 0 20px rgba(255,200,80,.18);
}

/* 中央光 */

.center-light{

position:absolute;

width:120px;
height:120px;

border-radius:50%;

background:
radial-gradient(circle,
rgba(255,255,255,1),
rgba(255,220,120,.95),
rgba(255,180,40,.12));

filter:blur(4px);

box-shadow:
0 0 60px rgba(255,220,120,.95),
0 0 120px rgba(255,180,40,.65);

animation:pulse 4s ease-in-out infinite;
}

/* 外圈 */

.magic-ring{
position:absolute;

width:620px;
height:620px;

border-radius:50%;

border:1px solid rgba(255,220,120,.18);

box-shadow:
0 0 30px rgba(255,220,120,.22),
inset 0 0 30px rgba(255,220,120,.12);

animation:rotateRing 20s linear infinite;
}

/* logo */

.logo{

position:absolute;

top:120px;

font-size:120px;
font-weight:900;

background:
linear-gradient(
135deg,
#fff7d8,
#ffd36f,
#fff1c7
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 12px rgba(255,240,180,.95),
0 0 42px rgba(255,180,40,.45);

opacity:0;

animation:logoShow 3s ease forwards 1s;
}

/* 星座 */

.zodiac{

position:absolute;

font-size:46px;
font-weight:900;

color:#fff2b8;

text-shadow:
0 0 12px rgba(255,220,120,.95),
0 0 28px rgba(255,180,40,.45);
}

.libra{
left:120px;
top:120px;
}

.scorpio{
right:120px;
top:120px;
}

/* title */

.title{

position:absolute;

bottom:170px;

font-size:42px;
font-weight:900;
letter-spacing:3px;

color:#fff0c8;

text-shadow:
0 0 12px rgba(255,220,120,.95),
0 0 30px rgba(255,180,40,.35);

opacity:0;

animation:textFade 2s ease forwards 2.4s;
}

.sub{

position:absolute;

bottom:130px;

font-size:18px;
letter-spacing:5px;

color:#ffe7b0;

opacity:0;

animation:textFade 2s ease forwards 2.8s;
}

/* loading */

.loading-wrap{

position:absolute;

bottom:72px;

width:320px;
height:5px;

border-radius:999px;

background:rgba(255,220,120,.12);

overflow:hidden;

box-shadow:
0 0 20px rgba(255,220,120,.22);
}

.loading-bar{

height:100%;
width:0%;

border-radius:999px;

background:
linear-gradient(
90deg,
#fff6d0,
#ffd36f,
#fffef2
);

box-shadow:
0 0 18px rgba(255,220,120,.95);

animation:loading 5s ease forwards;
}

/* 金塵 */

.gold-particle{

position:absolute;

width:4px;
height:4px;

border-radius:50%;

background:#ffd36f;

box-shadow:
0 0 10px rgba(255,220,120,.95);

animation:floatParticle linear infinite;
}

.tap{

position:absolute;

bottom:28px;

font-size:15px;
letter-spacing:3px;

color:#fff2c8;

animation:blink 2s infinite;
}

@keyframes openLeft{

0%{
transform:perspective(1200px) rotateY(0deg);
}

100%{
transform:perspective(1200px) rotateY(-82deg);
}
}

@keyframes openRight{

0%{
transform:perspective(1200px) rotateY(0deg);
}

100%{
transform:perspective(1200px) rotateY(82deg);
}
}

@keyframes rotateRing{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}
}

@keyframes pulse{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}
}

@keyframes logoShow{

from{
opacity:0;
transform:scale(.4);
filter:blur(12px);
}

to{
opacity:1;
transform:scale(1);
filter:blur(0px);
}
}

@keyframes textFade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0px);
}
}

@keyframes loading{

0%{
width:0%;
}

100%{
width:100%;
}
}

@keyframes starMove{
from{
transform:translateY(0px);
}
to{
transform:translateY(-280px);
}
}

@keyframes floatParticle{

0%{
transform:
translateY(0px)
scale(0);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:
translateY(-120vh)
translateX(60px)
scale(1.5);

opacity:0;
}
}

@keyframes blink{

0%,100%{
opacity:.35;
}

50%{
opacity:1;
}
}


.zodiac-line-wrap{
position:absolute;
z-index:5;

width:520px;
height:240px;
transform:translateY(-145px);

display:flex;
justify-content:center;
align-items:center;

opacity:0;

animation:
showLines 2s ease forwards 2.4s;
}

.zodiac-svg{
width:100%;
height:100%;

filter:
drop-shadow(0 0 12px rgba(120,200,255,.95))
drop-shadow(0 0 26px rgba(40,120,255,.55))
drop-shadow(0 0 60px rgba(0,80,255,.28));
}

/* 基礎線條樣式 */
.draw-line{
fill:none;
stroke:url(#goldLine);
stroke-width:6;
stroke-linecap:round;
stroke-linejoin:round;
}

/* ===== 🛠️ 核心修正：天秤座採用絕對穩健的透明度淡入動畫，100% 顯現 🛠️ ===== */
.libra-glow-group {
  opacity: 0;
  animation: fadeInLibra 2.0s cubic-bezier(0.4, 0, 0.2, 1) forwards 2.6s;
}

@keyframes fadeInLibra {
  to { opacity: 1; }
}

/* 天蠍座（單一連續線段，完美保留原本的長線劃開動畫） */
.scorpio-line{
stroke-dasharray: 1200;
stroke-dashoffset: 1200;
animation: drawScorpio 2.0s cubic-bezier(0.4, 0, 0.2, 1) forwards 3.0s;
}


.libra-extra-line{
fill:none;

stroke:#6fb8ff;
stroke-width:6;
stroke-linecap:round;

stroke-dasharray:400;
stroke-dashoffset:400;

filter:
drop-shadow(0 0 6px rgba(120,200,255,.55));

opacity:1;

animation:
drawExtraLine 1.6s ease forwards 3.2s;
}

@keyframes drawExtraLine{
to{
stroke-dashoffset:0;
}
}


@keyframes drawScorpio {
  to { stroke-dashoffset: 0; }
}

@keyframes showLines{
from{
opacity:0;
transform:scale(.7);
filter:blur(10px);
}
to{
opacity:1;
transform:scale(1);
filter:blur(0px);
}
}


/* ===== 往神殿內前進 ===== */

.temple-door{
animation:
templeZoom 7s ease-in-out forwards;
transform-origin:center center;
}

@keyframes templeZoom{

0%{
transform:
scale(1)
translateY(0px);
filter:blur(0px);
}

70%{
transform:
scale(1.18)
translateY(-10px);
filter:blur(0px);
}

100%{
transform:
scale(2.35)
translateY(20px);
filter:blur(8px);
}
}

#intro::after{

content:'';

position:absolute;
inset:0;

background:
radial-gradient(circle at center,
transparent 0%,
rgba(255,220,120,.05) 40%,
rgba(0,0,0,.92) 100%);

pointer-events:none;
}

.center-light{

animation:
portalLight 7s ease forwards;
}

@keyframes portalLight{

0%{
opacity:.7;
transform:scale(1);
}

70%{
opacity:1;
transform:scale(1.5);
}

100%{
opacity:1;
transform:scale(4.5);
filter:blur(18px);
}
}


/* ===== 浮雕升級（不改位置） ===== */

.door-left,
.door-right{

background:
linear-gradient(
145deg,
#2d1a00 0%,
#6e4a12 12%,
#d7a63e 25%,
#fff2b0 40%,
#b57812 60%,
#4d2a00 100%
) !important;

box-shadow:
0 0 18px rgba(255,190,60,.55),
inset 0 0 80px rgba(255,255,255,.08),
inset 0 0 25px rgba(255,220,120,.25),
0 0 60px rgba(255,180,40,.18) !important;

border:3px solid rgba(255,220,120,.95) !important;

overflow:hidden;
}

.door-left::before,
.door-right::before{

content:'';

position:absolute;
inset:22px;

border-radius:18px;

border:2px solid rgba(255,230,160,.85);

box-shadow:
inset 0 0 25px rgba(255,240,180,.18),
0 0 12px rgba(255,220,120,.22);
}

.door-left::after,
.door-right::after{

content:'';

position:absolute;

width:220px;
height:220px;

left:50%;
top:50%;

transform:translate(-50%,-50%);

border-radius:50%;

border:2px solid rgba(255,220,120,.45);

box-shadow:
0 0 25px rgba(255,220,120,.22),
inset 0 0 25px rgba(255,240,180,.12);

opacity:.95;
}

</style>
</head>

<body>

<div id="intro">

<div class="stars"></div>

<div class="magic-ring"></div>


<div class="logo">H ♥ L</div>

<div class="temple-door">

<div class="center-light"></div>

<div class="zodiac-line-wrap">

<svg class="zodiac-svg" viewBox="0 0 600 300">

<defs>
<linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#dff4ff"/>
<stop offset="50%" stop-color="#4fa8ff"/>
<stop offset="100%" stop-color="#d8f0ff"/>
</linearGradient>
</defs>

<g class="draw-line libra-glow-group">

  <!-- 上方弧線 -->
  <path d="M 65 130 L 125 130 Q 155 70 185 130 L 245 130" />

  <!-- 第一條 -->
  <path d="M 65 165 L 245 165" />

  <!-- 第二條 -->
  <path d="M 65 195 L 245 195" />

  <!-- 第三條（動畫版） -->
  <path class="libra-extra-line"
        d="M 55 206 L 255 206" />

</g>

<path class="draw-line scorpio-line"
d="M350 210
L350 120
Q350 90 380 90
Q410 90 410 120
L410 210

L410 120
Q410 90 440 90
Q470 90 470 120
L470 180

Q470 220 520 220

L500 198
M520 220
L488 238"
/>

</svg>

</div>


<div class="door-left">
<div class="door-pattern"></div>
<div class="circle"></div>
</div>

<div class="door-right">
<div class="door-pattern"></div>
<div class="circle"></div>
</div>

</div>

<div class="title">LY HOA Store</div>

<div class="sub">LOVE · MEMORY · FOREVER</div>

<div class="loading-wrap">
<div class="loading-bar"></div>
</div>



</div>

<script>

// 將金塵塞入特定容器，確保不干擾 SVG 的渲染樹
const starsContainer = document.querySelector(".stars") || document.body;

for(let i=0;i<60;i++){

const p = document.createElement("div");

p.className = "gold-particle";

p.style.left = Math.random()*100 + "vw";

p.style.top = Math.random()*100 + "vh";

p.style.animationDuration =
(6 + Math.random()*8) + "s";

p.style.animationDelay =
(Math.random()*6) + "s";

starsContainer.appendChild(p);

}

setTimeout(()=>{

document.getElementById("intro").style.transition="2s";
document.getElementById("intro").style.opacity="0";

setTimeout(()=>{
document.getElementById("intro").style.display="none";
},2000);

},6200);

</script>


<script>
setTimeout(()=>{
window.location.href="home.html";
},8200);
</script>

</body>
</html>
